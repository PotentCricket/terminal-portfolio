<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Portfolio</title>
    <meta name="description" content="Dan's personal terminal portfolio - a tech enthusiast working with systems, containers, and security.">
    <meta property="og:title" content="Terminal Portfolio - dazr.co">
    <meta property="og:description" content="Dan's personal terminal portfolio - systems, containers, and security.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://dazr.co/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #1a1f2e 0%, #2e3440 50%, #242933 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 16px;
        }

        .terminal {
            width: 100%;
            max-width: 900px;
            height: 520px;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: linear-gradient(180deg, #323232 0%, #2a2a2a 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: transform 0.15s ease;
            cursor: pointer;
        }

        .control:hover {
            transform: scale(1.1);
        }

        .control.close { background: #ff5f56; }
        .control.minimize { background: #ffbd2e; }
        .control.maximize { background: #27ca40; }

        .terminal-title {
            flex: 1;
            text-align: center;
            color: #a0a0a0;
            font-size: 13px;
            font-weight: 500;
            user-select: none;
        }

        .terminal-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .terminal-body::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .output {
            color: #d8dee9;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output .welcome {
            color: #a3be8c;
            margin-bottom: 16px;
        }

        .output .error {
            color: #bf616a;
        }

        .output .success {
            color: #a3be8c;
        }

        .output .info {
            color: #81a1c1;
        }

        .output .warning {
            color: #ebcb8b;
        }

        .output .muted {
            color: #5e81ac;
        }

        .line {
            margin-bottom: 4px;
        }

        .command-line {
            display: flex;
            align-items: center;
            margin-top: 12px;
        }

        .prompt {
            color: #a3be8c;
            margin-right: 8px;
            white-space: nowrap;
            user-select: none;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .terminal-input {
            background: transparent;
            border: none;
            outline: none;
            color: #d8dee9;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            caret-color: transparent;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #a3be8c;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .command-history {
            color: #d8dee9;
        }

        .command-entry {
            margin-bottom: 12px;
        }

        .command-text {
            color: #d8dee9;
        }

        .link {
            color: #81a1c1;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .list-item {
            padding-left: 16px;
            position: relative;
        }

        .list-item::before {
            content: '›';
            position: absolute;
            left: 0;
            color: #a3be8c;
        }

        .help-note {
            color: #5e81ac;
            font-size: 13px;
            text-align: center;
            user-select: none;
        }

        .help-note span {
            color: #a3be8c;
        }

        .help-note kbd {
            background: #3b4252;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #d8dee9;
            border: 1px solid #4c566a;
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
                min-height: 100dvh;
            }
            
            .terminal {
                width: 100%;
                max-width: none;
                height: 100dvh;
                min-height: 100dvh;
                border-radius: 0;
            }
            
            .terminal-body {
                padding: 12px;
                font-size: 14px;
            }
            
            .output, .terminal-input {
                font-size: 14px;
                line-height: 1.5;
            }
            
            .terminal-header {
                padding: 10px 12px;
            }
            
            .help-note {
                display: none;
            }
            
            .github-link {
                display: none;
            }
        }

        .github-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #5e81ac;
            font-size: 13px;
            text-decoration: none;
            user-select: none;
            transition: color 0.2s;
        }

        .github-link:hover {
            color: #81a1c1;
        }

        .github-icon {
            width: 18px;
            height: 18px;
        }

        .terminal.minimized {
            transform: scale(0) translateY(500px);
            opacity: 0;
            pointer-events: none;
        }

        .desktop-icon {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            pointer-events: none;
            user-select: none;
        }

        .desktop-icon.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .desktop-icon:hover .icon-terminal {
            background: #3a3a3a;
            transform: scale(1.05);
        }

        .icon-terminal {
            width: 64px;
            height: 64px;
            background: #2a2a2a;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #a3be8c;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon-label {
            color: #d8dee9;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

    <div class="terminal">

                <div class="control close" id="btn-close" title="Close"></div>
                <div class="control minimize" id="btn-minimize" title="Minimize"></div>

    </div>

    <div class="desktop-icon" id="desktop-icon" title="Terminal">
        <div class="icon-terminal">⌘</div>
        <div class="icon-label">Terminal</div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // CONFIG: Edit these values to customize your terminal
        // ═══════════════════════════════════════════════════════════════
        const CONFIG = {
            // ─── Personal Info ───
            name: 'Dan',
            domain: 'dazr.co',
            catCount: 6,
            
            // ─── Contact Setup ───
            web3formsKey: 'bde381a0-6e29-4162-9c64-750e04c28567',
            emailSubject: 'New message from dazr.co',
            
            // ─── Content ───
            aboutText: `Hi, I'm Dan.

I'm a tech enthusiast obsessed with tinkering with systems, containers, 
and security. I love the challenge of making things run faster and 
more securely.

I'm also learning to build with AI — orchestrating agents, crafting 
prompts, and curating code I couldn't write myself.

I'm also a proud dad to six cats who basically run my house and 
occasionally let me use my keyboard.

When I'm not wrangling Docker or AI workflows, I'm usually gaming 
to unwind and explore virtual worlds.

This is my little corner of the internet. Thanks for stopping by.`,
            
            skills: [
                { category: 'Containers & Orchestration', items: 'Docker, Docker Compose, container security basics' },
                { category: 'System Hardening', items: 'Linux OS hardening, SSH security, firewall configs' },
                { category: 'Security Mindset', items: 'Attack surface reduction, privilege management' }
            ],
            
            projects: [
                { name: 'dazr.co', desc: 'This terminal website — my personal web space', tech: 'AI-curated HTML/CSS (via Cascade AI)' },
                { name: 'cricket-cli', desc: 'Command-line toolkit for common workflows', tech: 'AI-assisted Go/Rust prompts' },
                { name: 'dotfiles', desc: 'Carefully curated development environment configs', tech: 'Shell + AI orchestration' }
            ],
            
            // ─── Options ───
            showDisclaimer: true,
            timezone: 'Australia/Perth'
        };
        // ═══════════════════════════════════════════════════════════════

        // Update page title and terminal header from CONFIG
        document.title = `${CONFIG.domain} — Terminal`;
        document.getElementById('terminal-title').textContent = `visitor@${CONFIG.domain} — ~`;

        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const cursor = document.getElementById('cursor');
        const terminalBody = document.querySelector('.terminal-body');

        const commands = {
            help: {
                description: 'List all available commands',
                execute: () => `
<span class="info">Available commands:</span>

<span class="list-item"><span class="success">help</span>        Show this help message</span>
<span class="list-item"><span class="success">about</span>       Learn about ${CONFIG.name}</span>
<span class="list-item"><span class="success">whoami</span>      Display visitor information</span>
<span class="list-item"><span class="success">date</span>        Show current date and time</span>
<span class="list-item"><span class="success">contact</span>     Send a message to ${CONFIG.name}</span>
<span class="list-item"><span class="success">projects</span>    List featured projects</span>
<span class="list-item"><span class="success">skills</span>      View technical knowledge</span>
<span class="list-item"><span class="success">clear</span>       Clear the terminal</span>
<span class="list-item"><span class="success">domain</span>      Info about ${CONFIG.domain}</span>
<span class="list-item"><span class="success">history</span>     Show command history</span>

<span class="muted">Tip: Use Tab for autocomplete, Up/Down for history</span>`
            },

            about: {
                description: `About ${CONFIG.name} & ${CONFIG.domain}`,
                execute: () => `<span class="info">${escapeHtml(CONFIG.aboutText).replace(/\n/g, '<br>')}</span>

<span class="muted">Built with vanilla HTML, CSS, and JavaScript</span>`
            },

            whoami: {
                description: 'Visitor information',
                execute: () => {
                    const ua = navigator.userAgent;
                    const platform = navigator.platform;
                    const language = navigator.language;
                    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    const screenWidth = window.screen.width;
                    const screenHeight = window.screen.height;

                    return `
<span class="info">Visitor Profile</span>

<span class="list-item">Device:      ${getDeviceType()}</span>
<span class="list-item">System:      ${getPlatformInfo(ua, platform)}</span>
<span class="list-item">Browser:     ${getBrowserName(ua)}</span>
<span class="list-item">Language:    ${language}</span>
<span class="list-item">Timezone:    ${timezone}</span>
<span class="list-item">Resolution:  ${getResolution()}</span>
<span class="muted">Don't worry, this information stays on your device.</span>`;
                }
            },

            date: {
                description: 'Current date and time',
                execute: () => {
                    const now = new Date();
                    const timeInZone = now.toLocaleTimeString('en-US', { 
                        hour: '2-digit', 
                        minute: '2-digit', 
                        second: '2-digit',
                        timeZone: CONFIG.timezone 
                    });
                    return `
<span class="info">Current Time</span>

${now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
${timeInZone} (${CONFIG.timezone})

<span class="muted">Unix timestamp: ${Math.floor(now.getTime() / 1000)}</span>`;
                }
            },

            contact: {
                description: `Send a message to ${CONFIG.name}`,
                execute: () => {
                    contactState.step = 'email';
                    contactState.email = '';
                    contactState.message = '';
                    startContactTimeout();
                    return `
<span class="info">Contact Form</span>

Enter your email address:

<span class="countdown-tip"><span class="muted">Tip: Press Ctrl+C to cancel • Timeout: 60s</span></span>`;
                }
            },

            projects: {
                description: 'Featured projects',
                execute: () => {
                    const projectsList = CONFIG.projects.map((p, i) => `
<span class="success">${i + 1}. ${p.name}</span>
   ${p.desc}
   <span class="muted">Tech: ${p.tech}</span>`).join('\n');
                    return `
<span class="info">Projects @ ${CONFIG.domain}</span>
${projectsList}

<span class="muted">Type 'contact' to discuss collaboration opportunities</span>`;
                }
            },

            skills: {
                description: 'Technical knowledge',
                execute: () => {
                    const skillsList = CONFIG.skills.map(s => `
<span class="success">${s.category}</span>
<span class="list-item">${s.items}</span>`).join('\n');
                    const disclaimer = CONFIG.showDisclaimer ? `
<span class="warning">Disclaimer</span>
<span class="list-item">100% self-taught • No certifications • Not a pro</span>
<span class="list-item">Just a curious person learning by doing</span>` : '';
                    return `
<span class="info">Things I Know About</span>
${skillsList}
${disclaimer}
<span class="muted">Learning in public at ${CONFIG.domain}</span>`;
                }
            },

            clear: {
                description: 'Clear terminal',
                execute: () => {
                    setTimeout(() => {
                        output.innerHTML = '';
                    }, 0);
                    return '';
                }
            },

            history: {
                description: 'Command history',
                execute: () => {
                    if (commandHistory.length === 0) {
                        return '<span class="muted">No commands in history yet.</span>';
                    }
                    return `
<span class="info">Command History</span>

${commandHistory.map((cmd, i) => `<span class="muted">${String(i + 1).padStart(3, '0')}</span>  ${cmd}`).join('\n')}`;
                }
            },

            echo: {
                description: 'Echo a message',
                execute: (args) => args.join(' ') || '<span class="muted">Usage: echo [message]</span>'
            },

            uptime: {
                description: 'System uptime',
                execute: () => {
                    const uptime = Math.floor((Date.now() - pageLoadTime) / 1000);
                    const mins = Math.floor(uptime / 60);
                    const secs = uptime % 60;
                    return `
<span class="info">Session Uptime</span>

${mins}m ${secs}s

<span class="muted">Page loaded at: ${new Date(pageLoadTime).toLocaleTimeString()}</span>`;
                }
            },

            domain: {
                description: `About ${CONFIG.domain} domain`,
                execute: () => `
<span class="info">${CONFIG.domain} Domain Info</span>

<span class="list-item">Domain:    ${CONFIG.domain}</span>
<span class="list-item">TLD:       .co (Colombia/commercial)</span>
<span class="list-item">Protocol:  HTTPS</span>
<span class="list-item">Status:    <span class="success">Active</span></span>

<span class="muted">Short domains are hard to come by. This one is mine.</span>`
            },
        };

        const VALID_EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let contactState = { step: null, email: '', message: '' };
        let contactTimeoutId = null;
        let contactCountdownId = null;
        let countdownTipEl = null;
        const CONTACT_TIMEOUT_MS = 60000;
        let commandHistory = [];
        let historyIndex = -1;
        let pageLoadTime = Date.now();

        function getBrowserName(ua) {
            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Edg')) return 'Edge';
            return 'Unknown';
        }

        function getPlatformInfo(ua, platform) {
            // Detect macOS - can't reliably distinguish Intel vs Apple Silicon from UA alone
            if (platform === 'MacIntel' || platform === 'Mac') {
                return 'macOS';
            }
            if (platform.startsWith('Win')) return 'Windows';
            if (platform.includes('Linux')) return 'Linux';
            if (/iPhone|iPad|iPod/.test(ua)) {
                if (ua.includes('iPad')) return 'iPad';
                return 'iPhone';
            }
            if (/Android/.test(ua)) return 'Android';
            return platform;
        }

        function getResolution() {
            const dpr = window.devicePixelRatio || 1;
            const logicalWidth = window.screen.width;
            const logicalHeight = window.screen.height;
            const physicalWidth = Math.round(logicalWidth * dpr);
            const physicalHeight = Math.round(logicalHeight * dpr);
            
            // If scaled, show both logical and physical
            if (dpr > 1) {
                return `${logicalWidth}x${logicalHeight} @ ${dpr}x (${physicalWidth}x${physicalHeight})`;
            }
            return `${logicalWidth}x${logicalHeight}`;
        }

        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/Mobi|Android|iPhone|iPad|iPod/.test(ua)) {
                if (/iPad|Android(?!.*Mobile)/.test(ua) || (window.screen.width > 768)) {
                    return 'Tablet';
                }
                return 'Mobile';
            }
            return 'Desktop';
        }

        function startContactTimeout() {
            clearTimeout(contactTimeoutId);
            clearInterval(contactCountdownId);
            
            let remainingSeconds = CONTACT_TIMEOUT_MS / 1000;
            
            const updateCountdown = () => {
                // Find the countdown tip element if not already stored
                if (!countdownTipEl) {
                    countdownTipEl = output.querySelector('.countdown-tip');
                }
                if (countdownTipEl) {
                    if (remainingSeconds > 0) {
                        countdownTipEl.innerHTML = `<span class="muted">Tip: Press Ctrl+C to cancel • Timeout: ${remainingSeconds}s</span>`;
                        remainingSeconds--;
                    } else {
                        countdownTipEl.innerHTML = `<span class="error">Timeout!</span>`;
                        clearInterval(contactCountdownId);
                    }
                }
            };
            
            updateCountdown();
            contactCountdownId = setInterval(updateCountdown, 1000);
            
            contactTimeoutId = setTimeout(() => {
                if (contactState.step) {
                    cancelContactForm();
                    print('<span class="error">Contact form timed out due to inactivity (60s).</span>');
                }
            }, CONTACT_TIMEOUT_MS);
        }

        function clearContactTimeout() {
            clearTimeout(contactTimeoutId);
            clearInterval(contactCountdownId);
            contactTimeoutId = null;
            contactCountdownId = null;
            countdownTipEl = null;
        }

        function cancelContactForm() {
            contactState.step = null;
            contactState.email = '';
            contactState.message = '';
            clearContactTimeout();
            print('<span class="warning">Contact form cancelled.</span>');
        }

        function updateCursorPosition() {
            const text = input.value;
            const charWidth = 8.4;
            cursor.style.left = `${text.length * charWidth}px`;
        }

        function scrollToBottom() {
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function print(text) {
            const div = document.createElement('div');
            div.className = 'line';
            div.innerHTML = text;
            output.appendChild(div);
            scrollToBottom();
        }

        function executeCommand(cmdLine) {
            const args = cmdLine.trim().split(/\s+/);
            const cmd = args.shift().toLowerCase();

            if (!cmd) return;

            // During contact flow, route input to handleContactFlow (except for Ctrl+C handled in keydown)
            if (contactState.step) {
                handleContactFlow(cmdLine);
                input.value = '';
                updateCursorPosition();
                return;
            }

            // Deduplicate consecutive commands
            if (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== cmdLine) {
                commandHistory.push(cmdLine);
                // Limit history to 100 entries
                if (commandHistory.length > 100) {
                    commandHistory.shift();
                }
            }
            historyIndex = commandHistory.length;

            const entry = document.createElement('div');
            entry.className = 'command-entry';
            entry.innerHTML = `<span class="prompt">$</span> <span class="command-text">${escapeHtml(cmdLine)}</span>`;
            output.appendChild(entry);

            if (commands[cmd]) {
                const result = commands[cmd].execute(args);
                if (result) {
                    const resultDiv = document.createElement('div');
                    resultDiv.className = 'line';
                    resultDiv.innerHTML = result;
                    output.appendChild(resultDiv);
                }
                input.value = '';
                updateCursorPosition();
                scrollToBottom();
            } else if (cmd === 'exit') {
                print('<span class="warning">Nice try! But there is no exit from the internet. 😄</span>');
                input.value = '';
                updateCursorPosition();
            } else if (cmd === 'sudo') {
                print('<span class="error">Permission denied: visitor lacks sudo privileges</span>');
                input.value = '';
                updateCursorPosition();
            } else {
                print(`<span class="error">Command not found: ${escapeHtml(cmd)}</span> <span class="muted">Type 'help' for available commands.</span>`);
                input.value = '';
                updateCursorPosition();
            }

            scrollToBottom();
        }

        function handleContactFlow(value) {
            const trimmed = value.trim();
            startContactTimeout();
            
            if (contactState.step === 'email') {
                if (!trimmed || !VALID_EMAIL_REGEX.test(trimmed)) {
                    print('<span class="error">Please enter a valid email address.</span>');
                    return;
                }
                contactState.email = trimmed;
                contactState.step = 'message';
                print('<span class="success">Email: ' + escapeHtml(trimmed) + '</span>');
                print('Enter your message:');
            } else if (contactState.step === 'message') {
                if (!trimmed) {
                    print('<span class="error">Message cannot be empty.</span>');
                    return;
                }
                contactState.message = trimmed;
                contactState.step = 'confirm';
                print('<span class="success">Message: ' + escapeHtml(trimmed.substring(0, 50)) + (trimmed.length > 50 ? '...' : '') + '</span>');
                print('');
                print('<span class="info">Confirm send?</span> <span class="warning">(y/n)</span>');
            } else if (contactState.step === 'confirm') {
                const lower = trimmed.toLowerCase();
                if (lower === 'y' || lower === 'yes') {
                    print('<span class="info">Sending message...</span>');
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    
                    fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            access_key: CONFIG.web3formsKey,
                            email: contactState.email,
                            message: contactState.message,
                            subject: CONFIG.emailSubject
                        }),
                        signal: controller.signal
                    }).then(response => {
                        clearTimeout(timeoutId);
                        if (response.ok) {
                            print('<span class="success">Message sent! I\'ll get back to you soon.</span>');
                        } else {
                            print('<span class="error">Failed to send. Please try again later.</span>');
                        }
                    }).catch(err => {
                        clearTimeout(timeoutId);
                        if (err.name === 'AbortError') {
                            print('<span class="error">Request timed out. Please try again later.</span>');
                        } else {
                            print('<span class="error">Failed to send. Please try again later.</span>');
                        }
                    });
                } else if (lower === 'n' || lower === 'no') {
                    print('<span class="warning">Message cancelled.</span>');
                } else {
                    print('<span class="error">Please enter y or n.</span>');
                    return;
                }
                contactState.step = null;
                contactState.email = '';
                contactState.message = '';
                clearContactTimeout();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function autocomplete() {
            const partial = input.value.toLowerCase();
            if (!partial) return;

            const matches = Object.keys(commands).filter(cmd => cmd.startsWith(partial));
            if (matches.length === 1) {
                input.value = matches[0];
                updateCursorPosition();
            } else if (matches.length > 1) {
                const entry = document.createElement('div');
                entry.className = 'command-entry';
                entry.innerHTML = `<span class="prompt">$</span> <span class="command-text">${escapeHtml(partial)}</span>`;
                output.appendChild(entry);
                
                print(`<span class="info">Possible matches:</span> ${matches.join('  ')}`);
                input.value = partial;
                updateCursorPosition();
            }
        }

        input.addEventListener('keydown', (e) => {
            // Handle Ctrl+C to cancel contact form
            if (contactState.step && e.key === 'c' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                cancelContactForm();
                input.value = '';
                updateCursorPosition();
                return;
            }
            
            if (e.key === 'Enter') {
                executeCommand(input.value);
                input.value = '';
                updateCursorPosition();
            } else if (e.key === 'Tab') {
                e.preventDefault();
                if (!contactState.step) {
                    autocomplete();
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                    updateCursorPosition();
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                    updateCursorPosition();
                } else {
                    historyIndex = commandHistory.length;
                    input.value = '';
                    updateCursorPosition();
                }
            }
        });

        input.addEventListener('input', updateCursorPosition);

        document.addEventListener('click', (e) => {
            if (e.target.closest('.terminal')) {
                input.focus();
            }
        });

        // Window control handlers
        document.getElementById('btn-close').addEventListener('click', (e) => {
            e.stopPropagation();
            print('<span class="warning">Nice try! But there is no exit from the internet. 😄</span>');
        });

        document.getElementById('btn-minimize').addEventListener('click', (e) => {
            e.stopPropagation();
            const terminal = document.querySelector('.terminal');
            const desktopIcon = document.getElementById('desktop-icon');
            terminal.classList.add('minimized');
            desktopIcon.classList.add('visible');
        });

        document.getElementById('desktop-icon').addEventListener('click', () => {
            const terminal = document.querySelector('.terminal');
            const desktopIcon = document.getElementById('desktop-icon');
            terminal.classList.remove('minimized');
            desktopIcon.classList.remove('visible');
            input.focus();
        });

        document.getElementById('btn-maximize').addEventListener('click', (e) => {
            e.stopPropagation();
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            } else {
                document.documentElement.requestFullscreen?.() || 
                document.documentElement.webkitRequestFullscreen?.();
            }
        });

        output.innerHTML = `
<span class="welcome">Welcome to ${CONFIG.domain} — ${CONFIG.name}'s corner of the internet</span>

Type <span class="success">about</span> to learn more, or <span class="success">help</span> for all commands.
`;

        input.focus();
        updateCursorPosition();
    </script>
</body>
</html>
